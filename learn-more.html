        /* ── ROOT: copied verbatim from mtfcca.html ── */

            --sky: #8BB4FD;

            --surface-subtle: #f5f7fa;

            --text-secondary: #4a5568;

            /* Nav */

            --nav-link-color: #4a5568;
            --gradient-accent-color: var(--midnight);

            /* Cards */
            --card-bg: #ffffff;
            --card-shadow: 0 -4px 24px rgba(0, 0, 0, 0.08), 0 25px 60px rgba(0, 0, 0, 0.12);

            --nav-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

                --surface-subtle: #090E17;
                --border: #2e3650;
                --text-primary: #e8edf8;
                --text-secondary: #9aa5c0;
                --text-muted: #6b7a9a;
                --text-accent: var(--black);
                --heading-primary: #ffffff;
                --accent-label: var(--sunbeam);
                --highlight: var(--sunbeam);

                /* Nav */
                --nav-bg: rgba(10, 12, 20, 0.92);
                --nav-link-color: #9aa5c0;
                --gradient-accent-color: var(--white);

                /* Cards */
                --card-bg: #1a1f2e;
                --card-shadow: 0 0 0 1px rgba(100, 130, 220, 0.18), 0 1px 0 0 rgba(100, 130, 220, 0.10);
                --section-bg: #1a1f2e;

                /* Footer */

    <script>
        // ── CMS CONFIG ───────────────────────────────────────────────────────────
        // Same spreadsheet ID used across every page — just change it once here.
        const CMS_SPREADSHEET_ID = '1HiXgfyNGJQGdjiMWETThhsuBEpz_rwgr3bZxjLtLDlg'; // ← replace this

        // ── SHEETS HELPER ────────────────────────────────────────────────────────
        /**
         * Fetches rows from a publicly published Google Spreadsheet tab.
         * Uses Google's free gviz/tq JSON endpoint — no Apps Script, no OAuth.
         *
         * REQUIREMENT: The spreadsheet must be published to the web.
         *   File → Share → Publish to web → Publish (leave defaults, click Publish)
         *
         * Returns an array of plain objects keyed by the header row,
         * filtered to active !== FALSE, sorted ascending by the order column.
         */
        async function fetchSheetRows(spreadsheetId, sheetName) {
            const url =
                'https://docs.google.com/spreadsheets/d/' +
                spreadsheetId +
                '/gviz/tq?tqx=out:json&sheet=' +
                encodeURIComponent(sheetName);

            const res = await fetch(url);
            const text = await res.text();

            // Google wraps the JSON in a JS callback wrapper — strip it
            const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/);
            if (!match) throw new Error('Unexpected Sheets response format for sheet: ' + sheetName);

            const json = JSON.parse(match[1]);
            const table = json.table;

            if (!table || !table.rows || table.rows.length === 0) return [];

            // Build header array from column labels
            const headers = table.cols.map(function (col) {
                return (col.label || '').trim().toLowerCase().replace(/\s+/g, '_');
            });

            return table.rows
                // Convert each row → plain object keyed by header
                .map(function (row) {
                    var obj = {};
                    headers.forEach(function (h, i) {
                        var cell = row.c ? row.c[i] : null;
                        obj[h] = (cell && cell.v !== null && cell.v !== undefined)
                            ? cell.v.toString()
                            : '';
                    });
                    return obj;
                })
                // Drop rows where active = FALSE / false / 0 / NO
                .filter(function (row) {
                    var a = (row['active'] || '').trim().toUpperCase();
                    return a !== 'FALSE' && a !== '0' && a !== 'NO';
                })
                // Sort ascending by the order column
                .sort(function (a, b) {
                    return (parseInt(a['order'], 10) || 0) - (parseInt(b['order'], 10) || 0);
                });
        }

        // ── IMAGE PATH HELPER ────────────────────────────────────────────────────
        const IMAGE_BASE = '../';
        function resolveImageUrl(path) {
            if (!path || path.trim() === '') return '';
            if (path.startsWith('http://') || path.startsWith('https://')) return path;
            return IMAGE_BASE + path.replace(/^\//, '');
        }

        // ── STATIC DATA NOT DRIVEN BY THE SHEET ─────────────────────────────────
        // The "programs" and "coaches" section markers in learn_more_sections
        // tell us WHERE in the page order these grids belong — the sheet doesn't
        // (yet) carry row-level data for them, so the actual cards live here.
        const PROGRAMS = [
            {
                season: 'summer', label: 'Summer', title: 'Cross Country Training',
                items: ['Boys Cross Country Preseason', 'Girls Cross Country Preseason', 'Base building and conditioning', 'Team building activities']
            },
            {
                season: 'fall', label: 'Fall', title: 'Cross Country Season',
                items: ['Boys High School XC', 'Girls High School XC', 'Boys Middle School XC', 'Girls Middle School XC']
            },
            {
                season: 'winter', label: 'Winter', title: 'Track & Field Training',
                items: ['Winter Run Club', 'Track & Field Preseason', 'Strength and conditioning', 'Indoor training options']
            },
            {
                season: 'spring', label: 'Spring', title: 'Track & Field Season',
                items: ['Boys Track & Field', 'Girls Track & Field', 'All events: sprints, distance, jumps, throws', 'Middle School opportunities']
            }
        ];

        const LEARN_MORE_COACHES = [
            { name: 'Jeff Renlund', title: 'Boys Cross Country Head Coach', image: 'images/jeff-renlund.png' },
            { name: 'Rebecca Wesley', title: 'Girls Cross Country Head Coach', image: 'images/rebecca-wessley.jpg' },
            { name: 'James Finch', title: 'Boys Track & Field Head Coach', image: 'images/james-finch.png' },
            { name: 'Jane Reimer-Morgan', title: 'Girls Track & Field Head Coach', image: 'images/jane-reimer-morgan.jpg' }
        ];

        // ── BUILD A STANDARD TEXT SECTION ────────────────────────────────────────
        function buildTextSection(row) {
            const section = document.createElement('div');
            section.className = 'content-section';

            const h2 = document.createElement('h2');
            h2.textContent = row.heading;
            section.appendChild(h2);

            // Optional floated image
            if (row.image_url && row.image_url.trim()) {
                const imgWrap = document.createElement('div');
                imgWrap.className = 'section-image';

                const img = document.createElement('img');
                img.src = resolveImageUrl(row.image_url);
                img.alt = row.heading;
                img.loading = 'lazy';

                imgWrap.appendChild(img);
                // Must be appended before body so text wraps around it
                section.appendChild(imgWrap);
            }

            // Body — stored as HTML in the sheet
            const body = document.createElement('div');
            body.innerHTML = row.body;
            section.appendChild(body);

            // Preserve the original "How to Join" numbered-list styling
            if ((row.heading || '').trim().toLowerCase() === 'how to join') {
                const ol = body.querySelector('ol');
                if (ol) ol.classList.add('join-list');
            }

            return section;
        }

        // ── BUILD THE SEASONAL PROGRAMS SECTION ──────────────────────────────────
        function buildProgramsSection(row) {
            const section = document.createElement('div');
            section.className = 'content-section';

            const h2 = document.createElement('h2');
            h2.textContent = row.heading || 'Year-Round Programs';
            section.appendChild(h2);

            const scrollContainer = document.createElement('div');
            scrollContainer.className = 'programs-scroll-container';

            const grid = document.createElement('div');
            grid.className = 'programs-grid';

            PROGRAMS.forEach(function (program) {
                const card = document.createElement('div');
                card.className = 'program-card ' + program.season;

                const label = document.createElement('span');
                label.className = 'season-label';
                label.textContent = program.label;
                card.appendChild(label);

                const h3 = document.createElement('h3');
                h3.textContent = program.title;
                card.appendChild(h3);

                const ul = document.createElement('ul');
                program.items.forEach(function (item) {
                    const li = document.createElement('li');
                    li.textContent = item;
                    ul.appendChild(li);
                });
                card.appendChild(ul);

                grid.appendChild(card);
            });

            scrollContainer.appendChild(grid);
            section.appendChild(scrollContainer);
            return section;
        }

        // ── BUILD THE COACHES SECTION ────────────────────────────────────────────
        function buildCoachesSection(row) {
            const section = document.createElement('div');
            section.className = 'content-section';

            const h2 = document.createElement('h2');
            h2.textContent = row.heading || 'Meet Our Coaches';
            section.appendChild(h2);

            if (row.body && row.body.trim()) {
                const bodyWrap = document.createElement('div');
                bodyWrap.innerHTML = row.body;
                section.appendChild(bodyWrap);
            }

            const grid = document.createElement('div');
            grid.className = 'coaches-grid';

            LEARN_MORE_COACHES.forEach(function (coach) {
                const card = document.createElement('div');
                card.className = 'coach-card';

                const imageWrap = document.createElement('div');
                imageWrap.className = 'coach-image';

                const img = document.createElement('img');
                img.alt = coach.name;
                img.loading = 'lazy';
                img.onerror = function () {
                    img.remove();
                    const ph = document.createElement('div');
                    ph.className = 'coach-image-placeholder';
                    ph.textContent = '👤';
                    imageWrap.appendChild(ph);
                };
                img.src = resolveImageUrl(coach.image);
                imageWrap.appendChild(img);

                const name = document.createElement('div');
                name.className = 'coach-name';
                name.textContent = coach.name;

                const title = document.createElement('div');
                title.className = 'coach-title';
                title.textContent = coach.title;

                card.appendChild(imageWrap);
                card.appendChild(name);
                card.appendChild(title);
                grid.appendChild(card);
            });

            section.appendChild(grid);
            return section;
        }

        // ── BUILD THE FAQ SECTION ────────────────────────────────────────────────
        function buildFaqSection(row, faqRows) {
            const section = document.createElement('div');
            section.className = 'content-section';

            const h2 = document.createElement('h2');
            h2.textContent = row.heading || 'Frequently Asked Questions';
            section.appendChild(h2);

            const container = document.createElement('div');
            container.className = 'faq-container';

            faqRows.forEach(function (faq) {
                const item = document.createElement('div');
                item.className = 'faq-item';
                item.addEventListener('click', function () {
                    item.classList.toggle('active');
                });

                const question = document.createElement('div');
                question.className = 'faq-question';
                question.appendChild(document.createTextNode(faq.question));

                const icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                icon.setAttribute('class', 'faq-toggle-icon');
                icon.setAttribute('width', '24');
                icon.setAttribute('height', '24');
                icon.setAttribute('viewBox', '0 0 24 24');
                icon.setAttribute('fill', 'none');

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', 'M12 5V19M5 12H19');
                path.setAttribute('stroke', 'currentColor');
                path.setAttribute('stroke-width', '2');
                path.setAttribute('stroke-linecap', 'round');
                icon.appendChild(path);
                question.appendChild(icon);

                const answer = document.createElement('div');
                answer.className = 'faq-answer';
                answer.textContent = faq.answer;

                item.appendChild(question);
                item.appendChild(answer);
                container.appendChild(item);
            });

            section.appendChild(container);
            return section;
        }

        // ── LOAD PAGE ────────────────────────────────────────────────────────────
        async function loadLearnMore() {
            const container = document.getElementById('learnmore-container');

            try {
                // Fetch both sheets in parallel — no waterfall delay
                const [sections, faqs] = await Promise.all([
                    fetchSheetRows(CMS_SPREADSHEET_ID, 'learn_more_sections'),
                    fetchSheetRows(CMS_SPREADSHEET_ID, 'learn_more_faq')
                ]);

                if (!sections.length) {
                    container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">No content yet.</p>';
                    return;
                }

                container.innerHTML = '';

                sections.forEach(function (row) {
                    var el;
                    var sectionId = (row.section_id || '').trim();

                    if (sectionId === 'programs') {
                        el = buildProgramsSection(row);
                    } else if (sectionId === 'coaches') {
                        el = buildCoachesSection(row);
                    } else if (sectionId === 'faq') {
                        el = buildFaqSection(row, faqs);
                    } else {
                        el = buildTextSection(row);
                    }

                    container.appendChild(el);
                });

            } catch (err) {
                console.error('Failed to load Learn More content:', err);
                container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">Unable to load content. Please try again later.</p>';
            }
        }

        // ── NAV ──────────────────────────────────────────────────────────────────
        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            const hamburger = document.querySelector('.hamburger');
            const backdrop = document.getElementById('menuBackdrop');
            menu.classList.toggle('active');
            hamburger.classList.toggle('active');
            backdrop.classList.toggle('active');
        }

        function closeMenu() {
            const menu = document.getElementById('navMenu');
            const hamburger = document.querySelector('.hamburger');
            const backdrop = document.getElementById('menuBackdrop');
            menu.classList.remove('active');
            hamburger.classList.remove('active');
            backdrop.classList.remove('active');
        }

        document.addEventListener('click', function (event) {
            const menu = document.getElementById('navMenu');
            const hamburger = document.querySelector('.hamburger');
            const backdrop = document.getElementById('menuBackdrop');
            if (menu.classList.contains('active') && !event.target.closest('.nav-content')) {
                menu.classList.remove('active');
                hamburger.classList.remove('active');
                backdrop.classList.remove('active');
            }
        });

        // ── INIT ─────────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', loadLearnMore);
    </script>
</body>

</html>
