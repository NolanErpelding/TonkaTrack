<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Latest news, updates, and announcements from Minnetonka Track & Field and Cross Country teams.">
    <meta name="keywords" content="Minnetonka Track News, Tonka Cross Country Updates, High School Sports News">

    <title>Latest News - Tonka Track & Field</title>

    <meta property="og:title" content="News - Tonka Track & Field">
    <meta property="og:description" content="Latest updates from Minnetonka Track & Field and Cross Country">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/png" href="../favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../favicons/favicon.svg" />
    <link rel="shortcut icon" href="../favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../favicons/apple-touch-icon.png" />
    <link rel="manifest" href="../favicons/site.webmanifest" />

    <style>
        :root {
            --minnetonka-blue: #003698;
            --midnight: #002870;
            --lake: #5395FF;
            --sky: #8BB4FD;
            --grape: #6C0787;
            --sunbeam: #F1B133;
            --mint: #078F96;
            --white: #ffffff;
            --black: #000000;
            --accent-color: var(--mint);
            --surface: #ffffff;
            --surface-subtle: #f5f7fa;
            --border: #e2e8f0;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --text-accent: var(--white);
            --heading-primary: var(--minnetonka-blue);
            --accent-label: var(--minnetonka-blue);
            --highlight: var(--sky);
            --nav-bg: #ffffff;
            --nav-link-color: #4a5568;
            --gradient-accent-color: var(--midnight);
            --card-bg: #ffffff;
            --card-shadow: 0 -4px 24px rgba(0, 0, 0, 0.08), 0 25px 60px rgba(0, 0, 0, 0.12);
            --section-bg: var(--white);
            --footer-bg: rgba(26, 32, 44, 0.95);
            --nav-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --inline-photo-caption: var(--text-muted);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --accent-color: var(--sunbeam);
                --surface: #11161F;
                --surface-subtle: #090E17;
                --border: #2e3650;
                --text-primary: #e8edf8;
                --text-secondary: #9aa5c0;
                --text-muted: #6b7a9a;
                --text-accent: var(--black);
                --heading-primary: #ffffff;
                --accent-label: var(--sunbeam);
                --highlight: var(--sunbeam);
                --nav-bg: rgba(10, 12, 20, 0.92);
                --nav-link-color: #9aa5c0;
                --gradient-accent-color: var(--white);
                --card-bg: #1a1f2e;
                --card-shadow: 0 0 0 1px rgba(100, 130, 220, 0.18), 0 1px 0 0 rgba(100, 130, 220, 0.10);
                --section-bg: #1a1f2e;
                --footer-bg: rgba(8, 10, 18, 0.97);
                --nav-shadow: 0 1px 0 0 rgba(100, 130, 220, 0.18);
                --inline-photo-caption: var(--text-muted);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--surface);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }

        /* ── NAV ── */
        .nav-bar {
            background: var(--nav-bg);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--nav-shadow);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-m-img {
            height: 2.5rem;
            width: auto;
            display: block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--heading-primary);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--nav-link-color);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--accent-label);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, var(--accent-label) 0%, var(--gradient-accent-color) 100%);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 4px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--nav-link-color);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* ── HERO ── */
        .page-hero {
            background: linear-gradient(135deg, var(--midnight) 0%, var(--minnetonka-blue) 100%);
            padding: 3.5rem 2rem;
            text-align: center;
        }

        .page-hero h1 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--white);
            margin-bottom: 0.5rem;
        }

        .page-hero p {
            font-size: 1.2rem;
            color: var(--sky);
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            flex: 1 0 auto;
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem 4rem;
            width: 100%;
        }

        /* ── LOADING / EMPTY STATES ── */
        .news-loading {
            text-align: center;
            color: var(--text-muted);
            padding: 4rem 0;
            font-size: 1rem;
        }

        /* ── ARTICLES ── */
        .article {
            background: var(--section-bg);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: var(--card-shadow);
            animation: fadeIn 0.6s ease-out;
        }

        .article-header {
            margin-bottom: 1.5rem;
        }

        .article-title {
            color: var(--heading-primary);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .article-content {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            overflow: auto;
            /* clearfix for floated inline photo */
        }

        /* Paragraphs inside body HTML from the sheet */
        .article-content p {
            margin-bottom: 1rem;
        }

        .article-content p:last-child {
            margin-bottom: 0;
        }

        .article-date {
            color: var(--accent-color);
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        /* ── INLINE PHOTO (floated beside article text) ── */
        .inline-photo {
            float: right;
            margin: 0 0 1rem 1.5rem;
            max-width: 250px;
            width: 35%;
        }

        .inline-photo img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
        }

        .photo-caption {
            color: var(--inline-photo-caption);
            font-size: 0.9rem;
            font-style: italic;
            margin-top: 0.5rem;
            text-align: center;
        }

        /* ── FOOTER ── */
        footer {
            background: var(--footer-bg);
            backdrop-filter: blur(10px);
            color: white;
            padding: 2rem;
            text-align: center;
            flex-shrink: 0;
        }

        /* ── ANIMATION ── */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .nav-content {
                padding: 0 1rem;
            }

            .logo-m-img {
                height: 2rem;
            }

            .logo-text {
                font-size: 1.2rem;
            }

            .nav-links {
                position: absolute;
                z-index: 1000;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--nav-bg);
                backdrop-filter: blur(10px);
                flex-direction: column;
                padding: 1rem 0;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease, opacity 0.3s ease;
                opacity: 0;
                gap: 0;
            }

            .nav-links li {
                width: 100%;
            }

            .nav-links a {
                display: block;
                padding: 1rem 2rem;
                width: 100%;
            }

            .nav-links.active {
                max-height: 400px;
                opacity: 1;
            }

            .hamburger {
                display: flex;
                z-index: 1001;
            }

            .hamburger.active span:nth-child(1) {
                transform: rotate(45deg) translate(5px, 5px);
            }

            .hamburger.active span:nth-child(2) {
                opacity: 0;
                transform: scale(0);
            }

            .hamburger.active span:nth-child(3) {
                transform: rotate(-45deg) translate(5px, -5px);
            }

            .page-hero h1 {
                font-size: 2rem;
            }

            .main-content {
                padding: 2rem 1rem;
            }

            .article {
                padding: 1.5rem;
            }

            .article-title {
                font-size: 1.5rem;
            }

            /* On mobile the inline photo goes full-width above the text */
            .inline-photo {
                float: none;
                margin: 0 0 1rem 0;
                max-width: 100%;
                width: 100%;
            }

            .menu-backdrop {
                position: fixed;
                top: 72px;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
                z-index: 999;
            }

            .menu-backdrop.active {
                opacity: 1;
                pointer-events: auto;
            }
        }
    </style>
</head>

<body>
    <nav class="nav-bar">
        <div class="nav-content">
            <a href="../" class="logo">
                <img src="../images/minnetonka-M-logo.png" alt="Minnetonka M" class="logo-m-img">
                <span class="logo-text">TONKA TRACK</span>
            </a>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
            <ul class="nav-links" id="navMenu">
                <li><a href="../" onclick="closeMenu()">Home</a></li>
                <li><a href="../news/" onclick="closeMenu()">News</a></li>
                <li><a href="../sports/" onclick="closeMenu()">Sports</a></li>
                <li><a href="../mtfcca/" onclick="closeMenu()">MTFCCA</a></li>
                <li><a href="../contact/" onclick="closeMenu()">Contact</a></li>
            </ul>
        </div>
        <div class="menu-backdrop" id="menuBackdrop"></div>
    </nav>

    <div class="page-hero">
        <h1>Latest News</h1>
        <p>Stay updated with the latest from Tonka Track &amp; Field</p>
    </div>

    <div class="main-content" id="news-container">
        <div class="news-loading">Loading articles…</div>
    </div>

    <footer>
        <p>&copy; 2026 Tonka Track &amp; Field. Building champions, one stride at a time.</p>
    </footer>

    <script>
        // ── CMS CONFIG ───────────────────────────────────────────────────────────
        // Same spreadsheet ID used across every page — just change it once here.
        const CMS_SPREADSHEET_ID = '1HiXgfyNGJQGdjiMWETThhsuBEpz_rwgr3bZxjLtLDlg'; // ← replace this

        // ── SHEETS HELPER ────────────────────────────────────────────────────────
        async function fetchSheetRows(spreadsheetId, sheetName) {
            const url =
                'https://docs.google.com/spreadsheets/d/' +
                spreadsheetId +
                '/gviz/tq?tqx=out:json&sheet=' +
                encodeURIComponent(sheetName);

            const res = await fetch(url);
            const text = await res.text();

            const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/);
            if (!match) throw new Error('Unexpected Sheets response format for: ' + sheetName);

            const json = JSON.parse(match[1]);
            const table = json.table;

            if (!table || !table.rows || table.rows.length === 0) return [];

            const headers = table.cols.map(function (col) {
                return (col.label || '').trim().toLowerCase().replace(/\s+/g, '_');
            });

            return table.rows
                .map(function (row) {
                    var obj = {};
                    headers.forEach(function (h, i) {
                        var cell = row.c ? row.c[i] : null;
                        obj[h] = (cell && cell.v !== null && cell.v !== undefined)
                            ? cell.v.toString() : '';
                    });
                    return obj;
                })
                .filter(function (row) {
                    var a = (row['active'] || '').trim().toUpperCase();
                    return a !== 'FALSE' && a !== '0' && a !== 'NO';
                })
                .sort(function (a, b) {
                    return (parseInt(a['order'], 10) || 0) - (parseInt(b['order'], 10) || 0);
                });
        }

        // ── NEWS LOADER ──────────────────────────────────────────────────────────
        async function loadNews() {
            const container = document.getElementById('news-container');

            try {
                const rows = await fetchSheetRows(CMS_SPREADSHEET_ID, 'news_articles');

                if (!rows.length) {
                    container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">No articles yet. Check back soon!</p>';
                    return;
                }

                container.innerHTML = '';

                rows.forEach(function (row) {
                    const article = document.createElement('article');
                    article.className = 'article';

                    // Build inline photo HTML if image_url is provided
                    var photoHtml = '';
                    if (row.image_url && row.image_url.trim()) {
                        photoHtml =
                            '<div class="inline-photo">' +
                            '<img src="' + escapeAttr(row.image_url) + '" ' +
                            'alt="' + escapeAttr(row.image_caption || row.title) + '" ' +
                            'loading="lazy">' +
                            (row.image_caption
                                ? '<div class="photo-caption">' + escapeHtml(row.image_caption) + '</div>'
                                : '') +
                            '</div>';
                    }

                    article.innerHTML =
                        '<div class="article-header">' +
                        '<h2 class="article-title">' + escapeHtml(row.title) + '</h2>' +
                        '</div>' +
                        '<div class="article-content">' +
                        // Inline photo floats right — must come BEFORE the body text
                        // so the text wraps around it correctly
                        photoHtml +
                        // body is stored as HTML in the sheet
                        row.body +
                        '</div>' +
                        '<div class="article-date">' + escapeHtml(row.date) + '</div>';

                    container.appendChild(article);
                });

            } catch (err) {
                console.error('Failed to load news:', err);
                container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">Unable to load articles. Please try again later.</p>';
            }
        }

        // ── ESCAPE HELPERS ───────────────────────────────────────────────────────
        function escapeHtml(str) {
            return (str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function escapeAttr(str) {
            return (str || '').replace(/"/g, '&quot;');
        }

        // ── NAV ──────────────────────────────────────────────────────────────────
        function toggleMenu() {
            document.getElementById('navMenu').classList.toggle('active');
            document.querySelector('.hamburger').classList.toggle('active');
            document.getElementById('menuBackdrop').classList.toggle('active');
        }

        function closeMenu() {
            document.getElementById('navMenu').classList.remove('active');
            document.querySelector('.hamburger').classList.remove('active');
            document.getElementById('menuBackdrop').classList.remove('active');
        }

        document.addEventListener('click', function (e) {
            const menu = document.getElementById('navMenu');
            if (menu.classList.contains('active') && !e.target.closest('.nav-content')) {
                closeMenu();
            }
        });

        // ── INIT ─────────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', loadNews);
    </script>
</body>

</html>
