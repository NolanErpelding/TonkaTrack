<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Minnetonka Track & Field and Cross Country Association (MTFCCA) - supporting Tonka running programs through fundraising and community engagement.">
    <meta name="keywords" content="MTFCCA, Minnetonka Track Association, Turkey Trot, Tonka Running Support">

    <title>MTFCCA</title>

    <meta property="og:title" content="MTFCCA - Tonka Track & Field">
    <meta property="og:description" content="Supporting Minnetonka Track & Field and Cross Country programs">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/png" href="../favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../favicons/favicon.svg" />
    <link rel="shortcut icon" href="../favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../favicons/apple-touch-icon.png" />
    <link rel="manifest" href="../favicons/site.webmanifest" />

    <style>
        :root {
            --minnetonka-blue: #003698;
            --midnight: #002870;
            --lake: #5395FF;
            --sky: #8BB4FD;
            --grape: #6C0787;
            --sunbeam: #F1B133;
            --mint: #078F96;
            --white: #ffffff;
            --black: #000000;
            --accent-color: var(--mint);
            --surface: #ffffff;
            --surface-subtle: #f5f7fa;
            --border: #e2e8f0;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --heading-primary: var(--minnetonka-blue);
            --accent-label: var(--minnetonka-blue);
            --nav-bg: #ffffff;
            --nav-link-color: #4a5568;
            --gradient-accent-color: var(--midnight);
            --card-shadow: 0 -4px 24px rgba(0, 0, 0, 0.08), 0 25px 60px rgba(0, 0, 0, 0.12);
            --section-bg: var(--white);
            --footer-bg: rgba(26, 32, 44, 0.95);
            --nav-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --accent-color: var(--sunbeam);
                --surface: #11161F;
                --surface-subtle: #1a1f2e;
                --border: #2e3650;
                --text-primary: #e8edf8;
                --text-secondary: #9aa5c0;
                --text-muted: #6b7a9a;
                --heading-primary: #ffffff;
                --accent-label: var(--sunbeam);
                --nav-bg: rgba(10, 12, 20, 0.92);
                --nav-link-color: #9aa5c0;
                --gradient-accent-color: var(--white);
                --card-shadow: 0 0 0 1px rgba(100, 130, 220, 0.18), 0 1px 0 0 rgba(100, 130, 220, 0.10);
                --section-bg: #1a1f2e;
                --footer-bg: rgba(8, 10, 18, 0.97);
                --nav-shadow: 0 1px 0 0 rgba(100, 130, 220, 0.18);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--surface);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }

        /* ── NAV ── */
        .nav-bar {
            background: var(--nav-bg);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--nav-shadow);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-m-img {
            height: 2.5rem;
            width: auto;
            display: block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--heading-primary);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--nav-link-color);
            text-decoration: none;
            font-weight: 500;
            position: relative;
        }

        @media (hover: hover) {
            .nav-links a:hover {
                color: var(--accent-label);
            }
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, var(--accent-label) 0%, var(--gradient-accent-color) 100%);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 4px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--nav-link-color);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* ── HERO ── */
        .page-hero {
            background: linear-gradient(135deg, var(--midnight) 0%, var(--minnetonka-blue) 100%);
            padding: 3.5rem 2rem;
            text-align: center;
        }

        .page-hero h1 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--white);
            margin-bottom: 0.5rem;
        }

        .page-hero p {
            font-size: 1.2rem;
            color: var(--sky);
        }

        /* ── MAIN ── */
        .main-content {
            flex: 1 0 auto;
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            width: 100%;
        }

        .content-loading {
            text-align: center;
            color: var(--text-muted);
            padding: 4rem 0;
            font-size: 1rem;
        }

        /* ── CONTENT SECTIONS ── */
        .content-section {
            background: var(--section-bg);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 2rem;
            animation: fadeIn 0.6s ease-out forwards;
            overflow: auto;
        }

        .content-section h2 {
            color: var(--heading-primary);
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        /* h3 / p / ul from body HTML stored in sheet */
        .content-section h3 {
            color: var(--accent-label);
            font-size: 1.5rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }

        .content-section p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .content-section ul,
        .content-section ol {
            color: var(--text-secondary);
            font-size: 1.2rem;
            line-height: 1.8;
            margin-left: 2rem;
            margin-bottom: 1rem;
        }

        .content-section li {
            margin-bottom: 0.5rem;
        }

        .content-section a {
            color: var(--accent-label);
            text-decoration: none;
            font-weight: 600;
        }

        /* ── SECTION IMAGE (floated right, e.g. turkey trot logo) ── */
        .section-image {
            float: right;
            width: 300px;
            margin: 0 0 20px 20px;
            aspect-ratio: 1;
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--lake) 0%, var(--midnight) 100%);
        }

        .section-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: var(--surface);
        }

        /* ── LEADERSHIP GRID ── */
        .leadership-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .leader-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        @media (hover: hover) {
            .leader-card:hover {
                transform: translateY(-8px);
                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
                border: 2px solid var(--accent-color);
            }
        }

        .leader-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, var(--lake) 0%, var(--midnight) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid var(--accent-color);
        }

        .leader-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .leader-image-placeholder {
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .leader-name {
            color: var(--heading-primary);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .leader-title {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* ── CONTACT BOX ── */
        .contact-wrapper {
            text-align: center;
        }

        .contact-box {
            background: var(--surface);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            text-align: center;
            margin-top: 1.5rem;
            display: inline-block;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
            text-decoration: none;
        }

        @media (hover: hover) {
            .contact-box:hover {
                background: var(--accent-color);
                transform: translateY(-2px);
                box-shadow: 0 6px 20px var(--accent-color);
            }
        }

        .contact-box p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        @media (hover: hover) {
            .contact-box:hover p {
                color: var(--black);
            }
        }

        .contact-box span {
            color: var(--accent-label);
            font-size: 1.1rem;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        @media (hover: hover) {
            .contact-box:hover span {
                color: var(--black);
            }
        }

        /* ── FOOTER ── */
        footer {
            background: var(--footer-bg);
            backdrop-filter: blur(10px);
            color: white;
            padding: 2rem;
            margin-top: 4rem;
            text-align: center;
            flex-shrink: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── MOBILE ── */
        @media (max-width: 900px) {
            .nav-content {
                padding: 0 1rem;
            }

            .logo-m-img {
                height: 2rem;
            }

            .logo-text {
                font-size: 1.2rem;
            }

            .nav-links {
                position: absolute;
                z-index: 1000;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--nav-bg);
                backdrop-filter: blur(10px);
                flex-direction: column;
                padding: 1rem 0;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease, opacity 0.3s ease;
                opacity: 0;
                gap: 0;
            }

            .nav-links li {
                width: 100%;
            }

            .nav-links a {
                display: block;
                padding: 1rem 2rem;
                width: 100%;
            }

            .nav-links.active {
                max-height: 400px;
                opacity: 1;
            }

            .hamburger {
                display: flex;
                z-index: 1001;
            }

            .hamburger.active span:nth-child(1) {
                transform: rotate(45deg) translate(5px, 5px);
            }

            .hamburger.active span:nth-child(2) {
                opacity: 0;
                transform: scale(0);
            }

            .hamburger.active span:nth-child(3) {
                transform: rotate(-45deg) translate(5px, -5px);
            }

            .main-content {
                padding: 2rem 1rem;
            }

            .page-hero h1 {
                font-size: 2rem;
            }

            .content-section {
                padding: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .content-section h2 {
                font-size: 1.75rem;
            }

            .content-section h3 {
                font-size: 1.25rem;
            }

            .content-section p,
            .content-section ul {
                font-size: 1rem;
            }

            .leadership-grid {
                grid-template-columns: 1fr;
            }

            .section-image {
                float: none;
                width: 100%;
                margin: 0 0 1.5rem 0;
                aspect-ratio: 16/9;
            }

            .menu-backdrop {
                position: fixed;
                top: 72px;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
                z-index: 999;
            }

            .menu-backdrop.active {
                opacity: 1;
                pointer-events: auto;
            }
        }

        @media (min-width: 769px) and (max-width: 1100px) {
            .leadership-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <nav class="nav-bar">
        <div class="nav-content">
            <a href="../" class="logo">
                <img src="../images/minnetonka-M-logo.png" alt="Minnetonka M" class="logo-m-img">
                <span class="logo-text">TONKA TRACK</span>
            </a>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
            <ul class="nav-links" id="navMenu">
                <li><a href="../" onclick="closeMenu()">Home</a></li>
                <li><a href="../news/" onclick="closeMenu()">News</a></li>
                <li><a href="../sports/" onclick="closeMenu()">Sports</a></li>
                <li><a href="../mtfcca/" onclick="closeMenu()">MTFCCA</a></li>
                <li><a href="../contact/" onclick="closeMenu()">Contact</a></li>
            </ul>
        </div>
        <div class="menu-backdrop" id="menuBackdrop"></div>
    </nav>

    <div class="page-hero">
        <h1>MTFCCA</h1>
        <p>Minnetonka Track &amp; Field and Cross Country Association</p>
    </div>

    <div class="main-content" id="mtfcca-container">
        <div class="content-loading">Loading…</div>
    </div>

    <footer>
        <p>&copy; 2026 Tonka Track &amp; Field. Building champions, one stride at a time.</p>
    </footer>

    <script>
        // ── CMS CONFIG ───────────────────────────────────────────────────────────
        const CMS_SPREADSHEET_ID = '1HiXgfyNGJQGdjiMWETThhsuBEpz_rwgr3bZxjLtLDlg'; // ← replace this

        // ── SHEETS HELPER ────────────────────────────────────────────────────────
        async function fetchSheetRows(spreadsheetId, sheetName) {
            const url =
                'https://docs.google.com/spreadsheets/d/' +
                spreadsheetId +
                '/gviz/tq?tqx=out:json&sheet=' +
                encodeURIComponent(sheetName);

            const res = await fetch(url);
            const text = await res.text();

            const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/);
            if (!match) throw new Error('Unexpected Sheets response for: ' + sheetName);

            const json = JSON.parse(match[1]);
            const table = json.table;

            if (!table || !table.rows || table.rows.length === 0) return [];

            const headers = table.cols.map(function (col) {
                return (col.label || '').trim().toLowerCase().replace(/\s+/g, '_');
            });

            return table.rows
                .map(function (row) {
                    var obj = {};
                    headers.forEach(function (h, i) {
                        var cell = row.c ? row.c[i] : null;
                        obj[h] = (cell && cell.v !== null && cell.v !== undefined)
                            ? cell.v.toString() : '';
                    });
                    return obj;
                })
                .filter(function (row) {
                    var a = (row['active'] || '').trim().toUpperCase();
                    return a !== 'FALSE' && a !== '0' && a !== 'NO';
                })
                .sort(function (a, b) {
                    return (parseInt(a['order'], 10) || 0) - (parseInt(b['order'], 10) || 0);
                });
        }

        // ── BUILD LEADERS SECTION ────────────────────────────────────────────────
        // Uses DOM methods throughout — no string escaping issues possible.
        function buildLeadersSection(heading, leaders) {
            const section = document.createElement('div');
            section.className = 'content-section';

            // Heading
            const h2 = document.createElement('h2');
            h2.textContent = heading;
            section.appendChild(h2);

            // Leader cards grid
            const grid = document.createElement('div');
            grid.className = 'leadership-grid';

            leaders.forEach(function (leader) {
                const card = document.createElement('div');
                card.className = 'leader-card';

                // Photo wrapper
                const imageWrap = document.createElement('div');
                imageWrap.className = 'leader-image';

                if (leader.image_url && leader.image_url.trim()) {
                    const img = document.createElement('img');
                    img.src = resolveImageUrl(leader.image_url);
                    img.alt = leader.name;
                    // On load failure swap in a placeholder emoji — no innerHTML tricks needed
                    img.onerror = function () {
                        img.remove();
                        const ph = document.createElement('div');
                        ph.className = 'leader-image-placeholder';
                        ph.textContent = '👤';
                        imageWrap.appendChild(ph);
                    };
                    imageWrap.appendChild(img);
                } else {
                    const ph = document.createElement('div');
                    ph.className = 'leader-image-placeholder';
                    ph.textContent = '👤';
                    imageWrap.appendChild(ph);
                }

                // Name
                const name = document.createElement('div');
                name.className = 'leader-name';
                name.textContent = leader.name;

                // Title
                const title = document.createElement('div');
                title.className = 'leader-title';
                title.textContent = leader.title;

                card.appendChild(imageWrap);
                card.appendChild(name);
                card.appendChild(title);
                grid.appendChild(card);
            });

            section.appendChild(grid);

            // Contact box
            const contactWrapper = document.createElement('div');
            contactWrapper.className = 'contact-wrapper';

            const contactLink = document.createElement('a');
            contactLink.href = 'mailto:mtfcca.board@gmail.com';
            contactLink.className = 'contact-box';

            const contactLabel = document.createElement('p');
            contactLabel.textContent = 'Contact us at:';

            const contactEmail = document.createElement('span');
            contactEmail.textContent = 'mtfcca.board@gmail.com';

            contactLink.appendChild(contactLabel);
            contactLink.appendChild(contactEmail);
            contactWrapper.appendChild(contactLink);
            section.appendChild(contactWrapper);

            return section;
        }

        // ── BUILD TEXT SECTION ───────────────────────────────────────────────────
        function buildTextSection(row) {
            const section = document.createElement('div');
            section.className = 'content-section';

            // Heading
            const h2 = document.createElement('h2');
            h2.textContent = row.heading;
            section.appendChild(h2);

            // Optional floated image (e.g. turkey trot logo)
            if (row.image_url && row.image_url.trim()) {
                const imgWrap = document.createElement('div');
                imgWrap.className = 'section-image';

                const img = document.createElement('img');
                img.src = row.image_url;
                img.alt = row.heading;
                img.loading = 'lazy';

                imgWrap.appendChild(img);
                // Must be appended before body so text wraps around it
                section.appendChild(imgWrap);
            }

            // Body — stored as HTML in the sheet
            const body = document.createElement('div');
            body.innerHTML = row.body;
            section.appendChild(body);

            return section;
        }

        // ── LOAD PAGE ────────────────────────────────────────────────────────────
        async function loadMtfcca() {
            const container = document.getElementById('mtfcca-container');

            try {
                // Fetch both sheets in parallel — no waterfall delay
                const [sections, leaders] = await Promise.all([
                    fetchSheetRows(CMS_SPREADSHEET_ID, 'mtfcca_sections'),
                    fetchSheetRows(CMS_SPREADSHEET_ID, 'mtfcca_leaders')
                ]);

                if (!sections.length) {
                    container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">No content yet.</p>';
                    return;
                }

                container.innerHTML = '';

                sections.forEach(function (row) {
                    var el;

                    if (row.section_id === 'leaders') {
                        // Render the leadership grid at this position in the order
                        el = buildLeadersSection(row.heading || 'MTFCCA Leadership', leaders);
                    } else {
                        // Render a standard text section
                        el = buildTextSection(row);
                    }

                    container.appendChild(el);
                });

            } catch (err) {
                console.error('Failed to load MTFCCA content:', err);
                container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">Unable to load content. Please try again later.</p>';
            }
        }

        const IMAGE_BASE = '../';
        function resolveImageUrl(path) {
            if (!path || path.startsWith('http')) return path;
            return IMAGE_BASE + path;
        }

        // ── NAV ──────────────────────────────────────────────────────────────────
        function toggleMenu() {
            document.getElementById('navMenu').classList.toggle('active');
            document.querySelector('.hamburger').classList.toggle('active');
            document.getElementById('menuBackdrop').classList.toggle('active');
        }

        function closeMenu() {
            document.getElementById('navMenu').classList.remove('active');
            document.querySelector('.hamburger').classList.remove('active');
            document.getElementById('menuBackdrop').classList.remove('active');
        }

        document.addEventListener('click', function (e) {
            const menu = document.getElementById('navMenu');
            if (menu.classList.contains('active') && !e.target.closest('.nav-content')) {
                closeMenu();
            }
        });

        // ── INIT ─────────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', loadMtfcca);
    </script>
</body>

</html>
